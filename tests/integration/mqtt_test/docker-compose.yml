services:
  mqtt_broker:
    image: eclipse-mosquitto
    volumes:
      - ./mqtt-config:/mosquitto/config
    ports:
      - 1883:1883

  opcuaserver:
    image: ghcr.io/umati/sample-server:develop
    ports:
      - 4840:4840
  gateway:
    depends_on:
      - mqtt_broker
      - opcuaserver
    image: localhost:5000/umati/umatigateway:${DOCKER_METADATA_OUTPUT_VERSION}
    volumes:
      - ./SimpleConfig/umatiGatewayConfig.xml:/app/umatiGatewayConfig.xml
#    command: >
#     /config/umatiGatewayConfig.xml /app/umatiGatewayConfig.xml &&
#           exec /app/umatiGateway"
