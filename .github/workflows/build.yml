name: build

on:
  push:
  pull_request:
    branches: [main, develop]
  merge_group:

permissions: read-all

jobs:
  build-linux:
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: UmatiGateway

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: |
          cd UmatiGateway
          dotnet restore

      - name: Install deb packaging tool
        run: |
          cd UmatiGateway/UmatiGateway
          dotnet tool install --global dotnet-deb
          export PATH="$PATH:/home/runner/.dotnet/tools"
          dotnet deb --configuration ${{ matrix.build_type }} --output ../umati-gateway.deb

      - name: Upload Debian Package
        uses: actions/upload-artifact@v3
        with:
          name: UmatiGateway-Debian
          path: umati-gateway.deb

      - name: Upload Published Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: UmatiGateway-Linux-${{ matrix.build_type }}-${{ matrix.os }}
          path: UmatiGateway/bin/${{ matrix.build_type }}/net8.0/

  build-windows:
    strategy:
      matrix:
        os: [windows-2019, windows-2022]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: UmatiGateway

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Build UmatiGateway
        run: |
          cd UmatiGateway
          msbuild UmatiGateway.sln /p:Configuration=${{ matrix.build_type }}

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v3
        with:
          name: UmatiGateway-Windows-${{ matrix.build_type }}-${{ matrix.os }}
          path: UmatiGateway/bin/${{ matrix.build_type }}/

  docker:
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: UmatiGateway

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v3
        with:
          context: ./UmatiGateway
          file: ./UmatiGateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/umati-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/umati-gateway:${{ github.sha }}

  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    needs: [build-linux, build-windows, docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          repo: ${{ github.repository }}
          commit: ${{ github.event.pull_request.head.sha }}
          if_no_artifact_found: fail
          skip_unpack: true

      - name: Checksum
        run: |
          sha256sum ./*.deb ./*.zip > SHA256-checksums

      - name: Display structure of downloaded files
        run: ls -R

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ./*.deb
            ./*.zip
            SHA256-checksums
